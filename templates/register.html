<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Espresso · Register</title>
    <!-- Google Fonts & Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
    <!-- flag-icon-css for country flags -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/6.6.6/css/flag-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* main container */
        .register-container {
            max-width: 400px;
            width: 100%;
            background: transparent;
            padding: 20px 20px 30px;
            text-align: center;
        }

        /* PNG logo */
        .register-logo {
            max-width: min(260px, 65vw);
            height: auto;
            margin: 0 auto 20px;
            display: block;
            object-fit: contain;
        }

        /* espresso tagline */
        .espresso-tagline {
            font-family: 'Playfair Display', serif;
            font-size: 13px;
            letter-spacing: 5px;
            color: #8b5a2b;
            text-transform: uppercase;
            margin-bottom: 32px;
            font-weight: 300;
        }

        /* input fields */
        .input-field {
            width: 100%;
            padding: 16px 22px;
            margin-bottom: 20px;
            border: 1.5px solid #d4b99b;
            border-radius: 60px;
            font-size: 16px;
            background: #fcf9f7;
            font-family: 'Montserrat', sans-serif;
            transition: border 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .input-field:focus {
            border-color: #8b5a2b;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(139, 90, 43, 0.1);
        }

        .input-field::placeholder {
            color: #b9a187;
            font-weight: 300;
        }

        /* validation error style (applied to fields) */
        .input-field.error-field,
        .phone-block.error-field {
            border-color: #c73b3b;
            background: #fff6f5;
            box-shadow: 0 0 0 2px rgba(199, 59, 59, 0.1);
        }

        /* phone block - exactly like login page */
        .phone-block {
            background: #fcf9f7;
            border-radius: 60px;
            border: 1.5px solid #d4b99b;
            margin-bottom: 20px;
            padding: 6px 6px 6px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: border 0.2s, box-shadow 0.2s;
        }

        /* country dropdown styled as pill (inline, not modal) */
        .country-dropdown {
            position: relative;
            min-width: 110px;
        }
        
        .country-selector {
            appearance: none;
            background-color: #ede0d6;
            border: none;
            border-radius: 40px;
            padding: 10px 28px 10px 16px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 15px;
            color: #4a3a2b;
            cursor: pointer;
            outline: none;
            width: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%238b5a2b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 14px;
        }
        
        .country-selector:hover {
            background-color: #e1d2c4;
        }

        /* phone input next to dropdown */
        .phone-input-simple {
            flex: 1;
            border: none;
            padding: 14px 12px 14px 6px;
            font-size: 16px;
            background: transparent;
            font-family: 'Montserrat', sans-serif;
            outline: none;
        }
        
        .phone-input-simple::placeholder {
            color: #b9a187;
            font-weight: 300;
        }

        /* register button */
        .register-btn {
            width: 100%;
            background: #5c3b2c;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 12px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
            border: 1px solid #4a3122;
            line-height: 1.2;
        }
        
        .register-btn:hover {
            background: #6f4a2e;
        }
        
        .register-btn .material-symbols-outlined {
            font-size: 22px;
        }

        /* login prompt */
        .login-prompt {
            margin-top: 28px;
            font-size: 15px;
            color: #6f4a2e;
        }
        
        .login-link {
            color: #8b5a2b;
            font-weight: 600;
            text-decoration: none;
            border-bottom: 2px solid #e9d9c8;
            padding-bottom: 2px;
            margin-left: 6px;
            cursor: pointer;
        }
        
        .login-link:hover {
            border-bottom: 2px solid #8b5a2b;
        }

        /* inline validation tooltip style (appears below fields) — new subtle style */
        .field-feedback {
            font-size: 13px;
            font-weight: 500;
            margin: -8px 0 16px 16px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #c73b3b;
            background: transparent;
            animation: fadeIn 0.15s ease;
        }
        .field-feedback .material-symbols-outlined {
            font-size: 18px;
            color: #c73b3b;
        }
        .field-feedback.success {
            color: #2f7d4f;
        }
        .field-feedback.success .material-symbols-outlined {
            color: #2f7d4f;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-4px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Hide feedback containers by default */
        .feedback-hidden {
            display: none;
        }

        @media (max-width: 480px) {
            .register-container { padding: 10px 10px 20px; }
            .country-dropdown { min-width: 95px; }
            .country-selector { font-size: 13px; padding: 8px 24px 8px 12px; }
        }
    </style>
</head>
<body>
    <!-- register container matching login page style -->
    <div class="register-container">
        <!-- PNG logo -->
        <img src="static/logo.png" alt="Espresso Logo" class="register-logo" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22260%22%20height%3D%2280%22%20viewBox%3D%220%200%20260%2080%22%3E%3Crect%20width%3D%22260%22%20height%3D%2280%22%20fill%3D%22%23f9f1e7%22%2F%3E%3Ctext%20x%3D%2230%22%20y%3D%2252%22%20font-family%3D%22Montserrat%22%20font-size%3D%2232%22%20fill%3D%22%238b5a2b%22%3EESPRESSO%3C%2Ftext%3E%3C%2Fsvg%3E';">

        <div class="espresso-tagline"> ☕ JOIN ESPRESSO FAMILY</div>

        <!-- FORM with name, email and phone (no global message area) -->
        <form id="registerForm" onsubmit="event.preventDefault(); handleRegister();">
            
            <!-- Name input field + its own feedback line -->
            <input type="text" id="fullName" class="input-field" placeholder="FULL NAME" value="Demo User" required>
            <div id="nameFeedback" class="field-feedback feedback-hidden"></div>
            
            <!-- Email input field + its own feedback line -->
            <input type="email" id="email" class="input-field" placeholder="EMAIL ADDRESS" value="demo@espresso.com" required>
            <div id="emailFeedback" class="field-feedback feedback-hidden"></div>
            
            <!-- Phone block with inline country dropdown -->
            <div class="phone-block" id="phoneBlock">
                <div class="country-dropdown">
                    <select id="countrySelect" class="country-selector">
                        <option value="bh" data-code="+973" selected>🇧🇭 +973</option>
                        <option value="us" data-code="+1">🇺🇸 +1</option>
                        <option value="gb" data-code="+44">🇬🇧 +44</option>
                        <option value="in" data-code="+91">🇮🇳 +91</option>
                        <option value="ca" data-code="+1">🇨🇦 +1</option>
                        <option value="au" data-code="+61">🇦🇺 +61</option>
                        <option value="de" data-code="+49">🇩🇪 +49</option>
                        <option value="fr" data-code="+33">🇫🇷 +33</option>
                        <option value="jp" data-code="+81">🇯🇵 +81</option>
                        <option value="cn" data-code="+86">🇨🇳 +86</option>
                        <option value="br" data-code="+55">🇧🇷 +55</option>
                        <option value="za" data-code="+27">🇿🇦 +27</option>
                        <option value="ae" data-code="+971">🇦🇪 +971</option>
                        <option value="sa" data-code="+966">🇸🇦 +966</option>
                        <option value="kw" data-code="+965">🇰🇼 +965</option>
                        <option value="qa" data-code="+974">🇶🇦 +974</option>
                    </select>
                </div>
                <input type="tel" id="phoneNumber" class="phone-input-simple" placeholder="Phone number" value="3600 1234" required>
            </div>
            <div id="phoneFeedback" class="field-feedback feedback-hidden"></div>

            <!-- REGISTER button -->
            <button type="submit" class="register-btn">
                <span class="material-symbols-outlined">how_to_reg</span> REGISTER
            </button>
        </form>

        <!-- login prompt -->
        <div class="login-prompt">
            Already have an account?
            <a href="#" class="login-link" id="loginPromptBtn">Login here</a>
        </div>
    </div>

    <script>
        // Get elements
        const countrySelect = document.getElementById('countrySelect');
        const phoneInput = document.getElementById('phoneNumber');
        const fullNameInput = document.getElementById('fullName');
        const emailInput = document.getElementById('email');
        const phoneBlock = document.getElementById('phoneBlock');

        // Feedback containers
        const nameFeedback = document.getElementById('nameFeedback');
        const emailFeedback = document.getElementById('emailFeedback');
        const phoneFeedback = document.getElementById('phoneFeedback');

        // Helper to hide all feedback divs and reset field styling
        function clearAllFeedback() {
            // hide all feedback containers
            [nameFeedback, emailFeedback, phoneFeedback].forEach(el => {
                el.classList.add('feedback-hidden');
                el.innerHTML = ''; // clear content
                el.classList.remove('success'); // remove any success class
            });
            // remove error styling from fields
            fullNameInput.classList.remove('error-field');
            emailInput.classList.remove('error-field');
            phoneBlock.classList.remove('error-field');
            phoneInput.classList.remove('error-field');
        }

        // Show feedback for a specific field
        function showFieldFeedback(field, message, isSuccess = false) {
            const feedbackMap = {
                'name': nameFeedback,
                'email': emailFeedback,
                'phone': phoneFeedback
            };
            const fieldFeedback = feedbackMap[field];
            if (!fieldFeedback) return;

            // Clear any previous content and make visible
            fieldFeedback.innerHTML = ''; 
            fieldFeedback.classList.remove('feedback-hidden', 'success');

            // Create icon and text
            const iconSpan = document.createElement('span');
            iconSpan.className = 'material-symbols-outlined';
            iconSpan.textContent = isSuccess ? 'check_circle' : 'error';
            fieldFeedback.appendChild(iconSpan);
            fieldFeedback.appendChild(document.createTextNode(message));

            if (isSuccess) {
                fieldFeedback.classList.add('success');
            }
        }

        // Mark field as error (visual border)
        function markFieldError(fieldName) {
            if (fieldName === 'name') {
                fullNameInput.classList.add('error-field');
            } else if (fieldName === 'email') {
                emailInput.classList.add('error-field');
            } else if (fieldName === 'phone') {
                phoneBlock.classList.add('error-field');
                phoneInput.classList.add('error-field');
            }
        }

        // login link
        document.getElementById('loginPromptBtn').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = 'login';
        });

        // Format phone number as user types (basic)
        phoneInput.addEventListener('input', function(e) {
            let value = e.target.value.replace(/[^\d\s]/g, '');
            e.target.value = value;
        });

        // Clear feedback when user focuses on a field (optional)
        fullNameInput.addEventListener('focus', () => {
            fullNameInput.classList.remove('error-field');
            nameFeedback.classList.add('feedback-hidden');
        });
        emailInput.addEventListener('focus', () => {
            emailInput.classList.remove('error-field');
            emailFeedback.classList.add('feedback-hidden');
        });
        phoneInput.addEventListener('focus', () => {
            phoneBlock.classList.remove('error-field');
            phoneInput.classList.remove('error-field');
            phoneFeedback.classList.add('feedback-hidden');
        });

        // REGISTER function without alerts and without unified message area
        function handleRegister() {
            const selectedOption = countrySelect.options[countrySelect.selectedIndex];
            const countryCode = selectedOption.getAttribute('data-code');
            const phone = phoneInput.value.trim();
            const fullName = fullNameInput.value.trim();
            const email = emailInput.value.trim();

            // Reset previous errors and feedback
            clearAllFeedback();

            let isValid = true;

            // Validate name
            if (!fullName) {
                showFieldFeedback('name', 'Full name is required');
                markFieldError('name');
                isValid = false;
            } 

            // Validate email
            if (!email) {
                showFieldFeedback('email', 'Email address is required');
                markFieldError('email');
                isValid = false;
            } else if (!email.includes('@') || !email.includes('.')) {
                showFieldFeedback('email', 'Enter a valid email (e.g., name@domain.com)');
                markFieldError('email');
                isValid = false;
            }

            // Validate phone
            if (!phone) {
                showFieldFeedback('phone', 'Phone number is required');
                markFieldError('phone');
                isValid = false;
            } else {
                const phoneDigits = phone.replace(/\D/g, '');
                if (phoneDigits.length < 8) {
                    showFieldFeedback('phone', 'Phone must have at least 8 digits');
                    markFieldError('phone');
                    isValid = false;
                }
            }

            // If any field invalid, stop
            if (!isValid) return;

            // If all valid, show success feedback per field and simulate redirect (OTP page)
            const fullPhone = countryCode + ' ' + phone;
            console.log('Registering:', fullName, email, fullPhone);

            // Show success inline under each field (clean, no global message)
            showFieldFeedback('name', 'Name looks good', true);
            showFieldFeedback('email', 'Email verified', true);
            showFieldFeedback('phone', 'Phone number valid', true);

            // Remove error borders if any
            fullNameInput.classList.remove('error-field');
            emailInput.classList.remove('error-field');
            phoneBlock.classList.remove('error-field');
            phoneInput.classList.remove('error-field');

            // In a real app you'd send data to server and then redirect.
            // For demo, we redirect after a short delay to show the success feedback.
            setTimeout(() => {
                window.location.href = 'otp';
            }, 1500);
        }
    </script>
</body>
</html>
