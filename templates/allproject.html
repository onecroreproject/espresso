<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Espresso · Collections</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
    <style>
        :root {
            --bg: #ffffff;
            --text: #3E2723;
            --accent: #FFDEAD;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--bg);
            color: var(--text);
            overflow: hidden;
            height: 100vh;
            position: relative;
        }

        /* Top Progress Bar */
        .progress-bar-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(0,0,0,0.05);
            z-index: 1000;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--accent);
            transition: width 0.3s ease-out;
        }

        /* Cinematic Header */
        .header {
            position: fixed;
            top: 30px;
            left: 30px;
            right: 30px;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            mix-blend-mode: difference;
            color: #ffffff;
        }

        .logo {
            height: 24px;
            filter: brightness(0) invert(1);
        }

        .menu-icon {
            font-size: 28px;
            cursor: pointer;
        }

        /* Swiping Gallery Container (VERTICAL) */
        .gallery-wrapper {
            width: 100%;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            scroll-snap-type: y mandatory;
            scrollbar-width: none;
            -ms-overflow-style: none;
            scroll-behavior: smooth;
        }

        .gallery-wrapper::-webkit-scrollbar {
            display: none;
        }

        .gallery-item {
            min-height: 100%;
            width: 100%;
            scroll-snap-align: center;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .gallery-item img {
            width: 100%;
            height: 100vh;
            object-fit: cover;
            transition: transform 1.2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .gallery-item:hover img {
            transform: scale(1.05);
        }

        /* Overlay Branding */
        .content-overlay {
            position: absolute;
            bottom: 120px;
            left: 30px;
            right: 30px;
            z-index: 10;
            pointer-events: none;
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .gallery-item.active .content-overlay {
            opacity: 1;
            transform: translateY(0);
        }

        .project-tag {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-bottom: 12px;
            opacity: 0.8;
            font-weight: 600;
            color: #ffffff;
        }

        .project-title {
            font-family: 'Montserrat', sans-serif;
            font-size: clamp(40px, 10vw, 84px);
            font-weight: 900;
            line-height: 1;
            margin-bottom: 24px;
            color: #ffffff;
            text-shadow: 0 4px 30px rgba(0,0,0,0.4);
        }

        /* CTA Button */
        .view-btn {
            background: var(--surface);
            color: var(--text-primary);
            border: none;
            padding: 16px 32px;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        .gallery-item.active .view-btn {
            opacity: 1;
            transform: translateY(0);
        }

        .view-btn:active {
            transform: scale(0.95);
        }

        /* Vertical Scroll Indicator */
        .scroll-indicator {
            position: fixed;
            right: 30px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }

        .dot {
            width: 4px;
            height: 4px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transition: all 0.4s ease;
        }

        .dot.active {
            background: var(--surface);
            height: 24px;
            border-radius: 4px;
        }

        /* Darkening Mask */
        .mask {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 50%, rgba(0,0,0,0.7) 100%);
            z-index: 5;
        }

        /* Scroll Hint Animation */
        .scroll-hint {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 20;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            opacity: 0.6;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateX(-50%) translateY(0);}
            40% {transform: translateX(-50%) translateY(-10px);}
            60% {transform: translateX(-50%) translateY(-5px);}
        }

    </style>
</head>
<body>

    <!-- Progress Bar -->
    <div class="progress-bar-container">
        <div class="progress-bar-fill" id="progressBar"></div>
    </div>

    <header class="header">
        <div onclick="window.location.href='/home'" style="cursor: pointer;">
            <img src="static/logo.png" alt="Espresso" class="logo" onerror="this.style.display='none'">
        </div>
        <span class="material-symbols-outlined menu-icon" onclick="window.location.href='/home'">close</span>
    </header>

    <div class="gallery-wrapper" id="gallery">
        <!-- Item 1 -->
        <div class="gallery-item active">
            <div class="mask"></div>
            <img src="static/imgg.jpeg" alt="Signature Collection">
            <div class="content-overlay">
                <div class="project-tag">Limited Edition</div>
                <div class="project-title">Signature<br>Collection</div>
            </div>
        </div>

        <!-- Item 2 -->
        <div class="gallery-item">
            <div class="mask"></div>
            <img src="static/imgg12.jpeg" alt="Artisan Series">
            <div class="content-overlay">
                <div class="project-tag">Single Origin</div>
                <div class="project-title">Artisan<br>Series</div>
            </div>
        </div>

        <!-- Item 3 -->
        <div class="gallery-item">
            <div class="mask"></div>
            <img src="static/imgg2.jpeg" alt="Cold Brews">
            <div class="content-overlay">
                <div class="project-tag">Summer Special</div>
                <div class="project-title">Cold<br>Brews</div>
            </div>
        </div>

        <!-- Item 4 -->
        <div class="gallery-item">
            <div class="mask"></div>
            <img src="static/imgg3.jpeg" alt="Nitro Series">
            <div class="content-overlay">
                <div class="project-tag">Nitro Infused</div>
                <div class="project-title">Nitro<br>Series</div>
            </div>
        </div>

        <!-- Item 5 -->
        <div class="gallery-item">
            <div class="mask"></div>
            <img src="static/imgg4.jpeg" alt="Pastry Selection">
            <div class="content-overlay">
                <div class="project-tag">Freshly Baked</div>
                <div class="project-title">Pastry<br>Selection</div>
            </div>
        </div>

        <!-- Item 6 -->
        <div class="gallery-item">
            <div class="mask"></div>
            <img src="static/imgg10.jpeg" alt="Brewed Classics">
            <div class="content-overlay">
                <div class="project-tag">Master Roasts</div>
                <div class="project-title">Brewed<br>Classics</div>
            </div>
        </div>

        <!-- Item 7 -->
        <div class="gallery-item">
            <div class="mask"></div>
            <img src="static/imgg8.jpeg" alt="Espresso House">
            <div class="content-overlay">
                <div class="project-tag">Pure Intensity</div>
                <div class="project-title">Espresso<br>House</div>
            </div>
        </div>

        <!-- Item 8 -->
        <div class="gallery-item">
            <div class="mask"></div>
            <img src="static/imgg6.jpeg" alt="Iced Favorites">
            <div class="content-overlay">
                <div class="project-tag">Chilled Blends</div>
                <div class="project-title">Iced<br>Favorites</div>
            </div>
        </div>

        <!-- Item 9 -->
        <div class="gallery-item">
            <div class="mask"></div>
            <img src="static/img1.jpeg" alt="Artisan Roast">
            <div class="content-overlay">
                <div class="project-tag">Small Batch</div>
                <div class="project-title">Artisan<br>Roast</div>
            </div>
        </div>
    </div>

    <!-- Vertical Pagination -->
    <div class="scroll-indicator">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
    </div>


    <script>
        const gallery = document.getElementById('gallery');
        const progressBar = document.getElementById('progressBar');
        const dots = document.querySelectorAll('.dot');
        const items = document.querySelectorAll('.gallery-item');

        gallery.addEventListener('scroll', () => {
            const h = gallery.scrollHeight - gallery.clientHeight;
            const scrollPercent = (gallery.scrollTop / h) * 100;
            progressBar.style.width = scrollPercent + '%';

            const index = Math.round(gallery.scrollTop / window.innerHeight);
            
            dots.forEach((dot, i) => {
                dot.classList.toggle('active', i === index);
            });

            items.forEach((item, i) => {
                item.classList.toggle('active', i === index);
            });
        });

        // Add a click handler to items to navigate
        items.forEach(item => {
            item.addEventListener('click', () => {
                window.location.href = '/productdetails';
            });
        });
    </script>
</body>
</html>
