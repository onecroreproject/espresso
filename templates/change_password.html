{% extends "base.html" %}

{% block title %}Espresso · Change Password{% endblock %}

{% block extra_css %}
<style>
    .account-container {
        padding: 24px 16px 100px;
    }

    .account-header {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-bottom: 32px;
    }

    .account-header h2 {
        font-family: 'Playfair Display', serif;
        font-size: 24px;
        color: var(--text-primary);
        font-weight: 700;
    }

    .form-group {
        margin-bottom: 24px;
    }

    .form-label {
        display: block;
        font-size: 14px;
        font-weight: 600;
        margin-bottom: 8px;
        color: var(--text-primary);
    }

    .form-input {
        width: 100%;
        padding: 16px;
        background: #f9f9f9;
        border: 1px solid #f0f0f0;
        border-radius: 16px;
        font-size: 16px;
        outline: none;
        transition: all 0.2s;
    }

    .form-input:focus {
        border-color: var(--accent);
        background: #ffffff;
    }

    .save-btn {
        width: 100%;
        background: var(--text-primary);
        color: white;
        border: none;
        padding: 18px;
        border-radius: 30px;
        font-size: 16px;
        font-weight: 700;
        margin-top: 16px;
        cursor: pointer;
    }
</style>
{% endblock %}

{% block content %}
<div class="account-container">
    <div class="account-header">
        <a href="javascript:history.back()" class="icon-btn">
            <span class="material-symbols-outlined">arrow_back</span>
        </a>
        <h2>Change Password</h2>
    </div>

    <form onsubmit="event.preventDefault(); alert('Password updated successfully!'); history.back();">
        <div class="form-group">
            <label class="form-label">Current Password</label>
            <input type="password" class="form-input" placeholder="Enter current password" required>
        </div>

        <div class="form-group">
            <label class="form-label">New Password</label>
            <input type="password" class="form-input" placeholder="Enter new password" required>
        </div>

        <div class="form-group">
            <label class="form-label">Confirm New Password</label>
            <input type="password" class="form-input" placeholder="Confirm new password" required>
        </div>

        <button type="submit" class="save-btn">Update Password</button>
    </form>
</div>
{% endblock %}
