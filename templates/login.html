<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Espresso · Login</title>
    <!-- Google Fonts & Material Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
    <!-- flag-icon-css for country flags -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/flag-icon-css/6.6.6/css/flag-icons.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: #ffffff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* main container */
        .login-container {
            max-width: 400px;
            width: 100%;
            background: transparent;
            padding: 20px 20px 30px;
            text-align: center;
        }

        /* PNG logo */
        .login-logo {
            max-width: min(260px, 65vw);
            height: auto;
            margin: 0 auto 20px;
            display: block;
            object-fit: contain;
        }

        /* espresso tagline */
        .espresso-tagline {
            font-family: 'Playfair Display', serif;
            font-size: 13px;
            letter-spacing: 5px;
            color: #8b5a2b;
            text-transform: uppercase;
            margin-bottom: 32px;
            font-weight: 300;
        }

        /* new inline country selector + phone - different style, no modal */
        .phone-block {
            background: #fcf9f7;
            border-radius: 60px;
            border: 1.5px solid #d4b99b;
            margin-bottom: 24px;
            padding: 6px 6px 6px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        /* country dropdown styled as pill (inline, not modal) */
        .country-dropdown {
            position: relative;
            min-width: 110px;
        }
        .country-selector {
            appearance: none;
            background-color: #ede0d6;
            border: none;
            border-radius: 40px;
            padding: 10px 28px 10px 16px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 15px;
            color: #4a3a2b;
            cursor: pointer;
            outline: none;
            width: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%238b5a2b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 14px;
        }
        .country-selector:hover {
            background-color: #e1d2c4;
        }
        /* flag inside dropdown option is tricky, but we show flag next to code */
        .selected-flag-preview {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        /* we'll not use separate wrapper; we embed flag via inline in dropdown? 
           But dropdown shows text only. For simplicity, we show flag + code in selector via styling */
        .country-selector option {
            font-family: 'Montserrat', sans-serif;
            background: white;
        }

        /* phone input next to dropdown */
        .phone-input-simple {
            flex: 1;
            border: none;
            padding: 14px 12px 14px 6px;
            font-size: 16px;
            background: transparent;
            font-family: 'Montserrat', sans-serif;
            outline: none;
        }
        .phone-input-simple::placeholder {
            color: #b9a187;
            font-weight: 300;
        }

        /* medium login button */
        .login-btn {
            width: 100%;
            background: #5c3b2c;
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 12px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
            border: 1px solid #4a3122;
            line-height: 1.2;
        }
        .login-btn:hover {
            background: #6f4a2e;
        }
        .login-btn .material-symbols-outlined {
            font-size: 22px;
        }

        /* register prompt */
        .register-prompt {
            margin-top: 28px;
            font-size: 15px;
            color: #6f4a2e;
        }
        .register-link {
            color: #8b5a2b;
            font-weight: 600;
            text-decoration: none;
            border-bottom: 2px solid #e9d9c8;
            padding-bottom: 2px;
            margin-left: 6px;
            cursor: pointer;
        }
        .register-link:hover {
            border-bottom: 2px solid #8b5a2b;
        }

        @media (max-width: 480px) {
            .login-container { padding: 10px 10px 20px; }
            .country-dropdown { min-width: 95px; }
            .country-selector { font-size: 13px; padding: 8px 24px 8px 12px; }
        }
    </style>
</head>
<body>
    <!-- login container with inline country dropdown (no modal, new style) -->
    <div class="login-container">
        <!-- PNG logo -->
        <img src="static/logo.png" alt="Espresso Logo" class="login-logo" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22260%22%20height%3D%2280%22%20viewBox%3D%220%200%20260%2080%22%3E%3Crect%20width%3D%22260%22%20height%3D%2280%22%20fill%3D%22%23f9f1e7%22%2F%3E%3Ctext%20x%3D%2230%22%20y%3D%2252%22%20font-family%3D%22Montserrat%22%20font-size%3D%2232%22%20fill%3D%22%238b5a2b%22%3EESPRESSO%3C%2Ftext%3E%3C%2Fsvg%3E';">

        <div class="espresso-tagline"> ☕ WELCOME TO ESPRESSO</div>

        <!-- FORM with new inline country dropdown (no modal, just select) and phone -->
        <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
            
            <!-- Phone block with inline country dropdown (different style, no popup) -->
            <div class="phone-block">
                <div class="country-dropdown">
                    <select id="countrySelect" class="country-selector">
                        <option value="bh" data-code="+973" selected>🇧🇭 +973</option>
                        <option value="us" data-code="+1">🇺🇸 +1</option>
                        <option value="gb" data-code="+44">🇬🇧 +44</option>
                        <option value="in" data-code="+91">🇮🇳 +91</option>
                        <option value="ca" data-code="+1">🇨🇦 +1</option>
                        <option value="au" data-code="+61">🇦🇺 +61</option>
                        <option value="de" data-code="+49">🇩🇪 +49</option>
                        <option value="fr" data-code="+33">🇫🇷 +33</option>
                        <option value="jp" data-code="+81">🇯🇵 +81</option>
                        <option value="cn" data-code="+86">🇨🇳 +86</option>
                        <option value="br" data-code="+55">🇧🇷 +55</option>
                        <option value="za" data-code="+27">🇿🇦 +27</option>
                        <option value="ae" data-code="+971">🇦🇪 +971</option>
                        <option value="sa" data-code="+966">🇸🇦 +966</option>
                        <option value="kw" data-code="+965">🇰🇼 +965</option>
                        <option value="qa" data-code="+974">🇶🇦 +974</option>
                    </select>
                </div>
                <input type="tel" id="phoneNumber" class="phone-input-simple" placeholder="Phone number" value="3600 1234" required>
            </div>

            <!-- LOGIN button -->
            <button type="submit" class="login-btn">
                <span class="material-symbols-outlined">local_cafe</span> LOGIN
            </button>
        </form>

        <!-- register prompt -->
        <div class="register-prompt">
            No account?
            <a href="#" class="register-link" id="registerPromptBtn">Register here</a>
        </div>
    </div>

    <script>
        // Get elements
        const countrySelect = document.getElementById('countrySelect');
        const phoneInput = document.getElementById('phoneNumber');

        // register link
        document.getElementById('registerPromptBtn').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = 'register';
        });

        // LOGIN function: redirect to OTP page (uses selected country code from select)
        function handleLogin() {
            const selectedOption = countrySelect.options[countrySelect.selectedIndex];
            const countryCode = selectedOption.getAttribute('data-code'); // e.g., +973
            const phone = phoneInput.value;
            const fullPhone = countryCode + ' ' + phone;
            console.log('Sending OTP to', fullPhone);
            
            // Redirect to OTP page
            window.location.href = 'otp';
        }

        // No need for complex flag update because dropdown shows flag+code directly.
        // The data-code attribute is used for the actual number.
    </script>
</body>
</html>
