<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Espresso · Login</title>
    <!-- Google Fonts & Material Icons -->
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Montserrat:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
    <style>
        :root {
            --accent:        #FFDEAD;
            --accent-hover:  #F5DEB3;
            --text-primary:  #3E2723;
            --border:        #f0f0f0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background: var(--surface);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* main container */
        .login-container {
            max-width: 400px;
            width: 100%;
            background: transparent;
            padding: 20px 20px 30px;
            text-align: center;
        }

        /* PNG logo */
        .login-logo {
            max-width: min(260px, 65vw);
            height: auto;
            margin: 0 auto 20px;
            display: block;
            object-fit: contain;
        }

        /* espresso tagline */
        .espresso-tagline {
            font-family: 'Montserrat', sans-serif;
            font-size: 13px;
            letter-spacing: 5px;
            color: #555555;
            text-transform: uppercase;
            margin-bottom: 32px;
            font-weight: 300;
        }

        /* phone block */
        .phone-block {
            background: var(--surface);
            border-radius: 60px;
            border: 1px solid #f0f0f0;
            margin-bottom: 24px;
            padding: 6px 6px 6px 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            transition: all 0.2s ease;
        }

        .phone-block:focus-within {
            border-color: var(--accent);
            background: var(--surface);
        }

        /* country dropdown */
        .country-dropdown {
            position: relative;
            min-width: 110px;
        }

        .country-selector {
            appearance: none;
            background-color: #ffffff;
            border: 1px solid #f0f0f0;
            border-radius: 40px;
            padding: 10px 28px 10px 16px;
            font-family: 'Montserrat', sans-serif;
            font-weight: 500;
            font-size: 15px;
            color: var(--text-primary);
            cursor: pointer;
            outline: none;
            width: 100%;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%23000000" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>');
            background-repeat: no-repeat;
            background-position: right 12px center;
            background-size: 14px;
        }

        .country-selector:hover {
            background-color: #fcfcfc;
        }

        .country-selector:focus {
            outline: 2px solid var(--accent);
            outline-offset: 2px;
        }

        .country-selector option {
            font-family: 'Montserrat', sans-serif;
            background: white;
        }

        /* phone input */
        .phone-input-simple {
            flex: 1;
            border: none;
            padding: 14px 12px 14px 6px;
            font-size: 16px;
            background: transparent;
            font-family: 'Montserrat', sans-serif;
            outline: none;
        }

        .phone-input-simple::placeholder {
            color: #aaaaaa;
            font-weight: 300;
        }

        .phone-input-simple:focus {
            caret-color: var(--text-primary);
        }

        /* BROWN LOGIN BUTTON */
        .login-btn {
            width: 100%;
            background: var(--accent);
            color: #000000;
            border: none;
            padding: 14px 20px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-top: 12px;
            cursor: pointer;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.25s ease;
            border: 1px solid rgba(255, 255, 255, 0.15);
            line-height: 1.2;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.05);
        }

        .login-btn:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        .login-btn:active {
            transform: translateY(1px);
        }

        .login-btn .material-symbols-outlined {
            font-size: 22px;
        }

        /* register prompt */
        .register-prompt {
            margin-top: 28px;
            font-size: 15px;
            color: var(--text-primary);
        }

        .register-link {
            color: var(--text-primary);
            font-weight: 700;
            text-decoration: none;
            border-bottom: 2px solid var(--accent);
            padding-bottom: 2px;
            margin-left: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .register-link:hover {
            background: var(--accent);
            color: #000000;
        }

        /* validation feedback */
        .field-feedback {
            font-size: 12px;
            font-weight: 500;
            margin: -12px 0 16px 18px;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            background: rgba(255, 255, 255, 0.96);
            padding: 5px 16px;
            border-radius: 40px;
            width: fit-content;
            animation: fadeIn 0.2s ease;
            border-left: 3px solid #cccccc;
        }

        .field-feedback .material-symbols-outlined {
            font-size: 14px;
            color: #999999;
        }

        .field-feedback.success {
            color: #4CAF50;
            background: rgba(240, 255, 240, 0.96);
            border-left-color: #4CAF50;
        }

        .field-feedback.success .material-symbols-outlined {
            color: #4CAF50;
        }

        .feedback-hidden {
            display: none;
        }

        .error-field {
            border-color: #c0392b !important;
            background: #fff5f5 !important;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 10px 10px 20px;
            }

            .country-dropdown {
                min-width: 95px;
            }

            .country-selector {
                font-size: 13px;
                padding: 8px 24px 8px 12px;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <img src="static/logo.png" alt="Espresso Logo" class="login-logo"
            onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22260%22%20height%3D%2280%22%20viewBox%3D%220%200%20260%2080%22%3E%3Crect%20width%3D%22260%22%20height%3D%2280%22%20fill%3D%22%23ffffff%22%2F%3E%3Ctext%20x%3D%2230%22%20y%3D%2252%22%20font-family%3D%22Montserrat%22%20font-size%3D%2232%22%20fill%3D%22%23000000%22%3ESPRESSO%3C%2Ftext%3E%3C%2Fsvg%3E';">

        <div class="espresso-tagline"> ☕ WELCOME TO ESPRESSO</div>

        <form id="loginForm" onsubmit="event.preventDefault(); handleLogin();">
            <div class="phone-block" id="phoneBlock">
                <div class="country-dropdown">
                    <select id="countrySelect" class="country-selector">
                        <option value="bh" data-code="+973" selected>🇧🇭 +973</option>
                        <option value="us" data-code="+1">🇺🇸 +1</option>
                        <option value="gb" data-code="+44">🇬🇧 +44</option>
                        <option value="in" data-code="+91">🇮🇳 +91</option>
                        <option value="ca" data-code="+1">🇨🇦 +1</option>
                        <option value="au" data-code="+61">🇦🇺 +61</option>
                        <option value="de" data-code="+49">🇩🇪 +49</option>
                        <option value="fr" data-code="+33">🇫🇷 +33</option>
                        <option value="jp" data-code="+81">🇯🇵 +81</option>
                        <option value="cn" data-code="+86">🇨🇳 +86</option>
                        <option value="br" data-code="+55">🇧🇷 +55</option>
                        <option value="za" data-code="+27">🇿🇦 +27</option>
                        <option value="ae" data-code="+971">🇦🇪 +971</option>
                        <option value="sa" data-code="+966">🇸🇦 +966</option>
                        <option value="kw" data-code="+965">🇰🇼 +965</option>
                        <option value="qa" data-code="+974">🇶🇦 +974</option>
                        <option value="eg" data-code="+20">🇪🇬 +20</option>
                        <option value="tr" data-code="+90">🇹🇷 +90</option>
                        <option value="my" data-code="+60">🇲🇾 +60</option>
                        <option value="sg" data-code="+65">🇸🇬 +65</option>
                    </select>
                </div>
                <input type="tel" id="phoneNumber" class="phone-input-simple" placeholder="Phone number"
                    value="3600 1234" autocomplete="tel">
            </div>
            <div id="phoneFeedback" class="field-feedback feedback-hidden"></div>

            <button type="submit" class="login-btn">
                <span class="material-symbols-outlined">local_cafe</span> LOGIN
            </button>
        </form>

        <div class="register-prompt">
            No account?
            <a href="#" class="register-link" id="registerPromptBtn">Register here</a>
        </div>
    </div>

    <script>
        const countrySelect = document.getElementById('countrySelect');
        const phoneInput = document.getElementById('phoneNumber');
        const phoneBlock = document.getElementById('phoneBlock');
        const phoneFeedback = document.getElementById('phoneFeedback');

        function clearPhoneFeedback() {
            phoneFeedback.classList.add('feedback-hidden');
            phoneFeedback.innerHTML = '';
            phoneFeedback.classList.remove('success');
            phoneBlock.classList.remove('error-field');
            phoneInput.classList.remove('error-field');
        }

        function showPhoneFeedback(message, isSuccess = false) {
            phoneFeedback.innerHTML = '';
            phoneFeedback.classList.remove('feedback-hidden', 'success');
            const iconSpan = document.createElement('span');
            iconSpan.className = 'material-symbols-outlined';
            iconSpan.textContent = isSuccess ? 'check_circle' : 'info';
            phoneFeedback.appendChild(iconSpan);
            phoneFeedback.appendChild(document.createTextNode(message));
            if (isSuccess) {
                phoneFeedback.classList.add('success');
            }
            phoneFeedback.classList.remove('feedback-hidden');
        }

        function markPhoneError() {
            phoneBlock.classList.add('error-field');
            phoneInput.classList.add('error-field');
        }

        phoneInput.addEventListener('input', function (e) {
            let raw = e.target.value;
            let cleaned = raw.replace(/[^\d\s+]/g, '');
            e.target.value = cleaned;
            if (phoneBlock.classList.contains('error-field')) {
                phoneBlock.classList.remove('error-field');
                phoneInput.classList.remove('error-field');
            }
            phoneFeedback.classList.add('feedback-hidden');
        });

        phoneInput.addEventListener('focus', () => {
            phoneBlock.classList.remove('error-field');
            phoneInput.classList.remove('error-field');
            phoneFeedback.classList.add('feedback-hidden');
        });

        document.getElementById('registerPromptBtn').addEventListener('click', function (e) {
            e.preventDefault();
            window.location.href = 'register';
        });

        function handleLogin() {
            const selectedOption = countrySelect.options[countrySelect.selectedIndex];
            const countryCode = selectedOption.getAttribute('data-code');
            const phone = phoneInput.value.trim();

            clearPhoneFeedback();
            let isValid = true;

            if (!phone) {
                showPhoneFeedback('Please enter your phone number');
                markPhoneError();
                isValid = false;
            } else {
                const phoneDigits = phone.replace(/\D/g, '');
                if (phoneDigits.length < 7) {
                    showPhoneFeedback('Phone number must contain at least 7 digits');
                    markPhoneError();
                    isValid = false;
                } else if (phoneDigits.length > 15) {
                    showPhoneFeedback('Phone number is too long (max 15 digits)');
                    markPhoneError();
                    isValid = false;
                }
            }

            if (!isValid) return;

            showPhoneFeedback('✓ Number verified — redirecting...', true);
            phoneBlock.classList.remove('error-field');
            phoneInput.classList.remove('error-field');

            const fullPhone = countryCode + ' ' + phone;
            console.log('Sending OTP to', fullPhone);

            setTimeout(() => {
                window.location.href = 'otp';
            }, 800);
        }

        phoneInput.addEventListener('keypress', function (event) {
            if (event.key === 'Enter') {
                event.preventDefault();
                handleLogin();
            }
        });

        if (phoneInput.value === "3600 1234") {
            phoneInput.addEventListener('focus', function onFirstFocus() {
                if (phoneInput.value === "3600 1234") {
                    phoneInput.value = "";
                }
                phoneInput.removeEventListener('focus', onFirstFocus);
            });
        }
    </script>
</body>

</html>
