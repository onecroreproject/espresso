<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Espresso — Cinematic Experience</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #000000;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        /* Fullscreen Video Background - Pure Cinematic */
        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* Elegant dark overlay for depth and text contrast */
        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, rgba(0, 0, 0, 0.3) 0%, rgba(0, 0, 0, 0.6) 100%);
            z-index: 2;
        }

        /* Smooth fade overlay for transition to next page */
        .fade-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #fef7f0;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.7s cubic-bezier(0.2, 0.9, 0.3, 1.1);
        }

        .fade-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* Minimal brand presence - subtle logo */
        .brand-container {
            position: fixed;
            bottom: 30px;
            left: 0;
            right: 0;
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        .logo {
            max-width: clamp(120px, 30vw, 180px);
            width: auto;
            height: auto;
            filter: brightness(0) invert(1);
            opacity: 0.85;
            transition: opacity 0.3s ease;
        }

        /* Subtle breathing animation for brand presence */
        @keyframes softBreathing {
            0% {
                opacity: 0.7;
            }

            100% {
                opacity: 0.9;
            }
        }

        .brand-container {
            animation: softBreathing 2.5s ease-in-out infinite alternate;
        }

        /* Responsive adjustments */
        @media (max-width: 768px) {
            .brand-container {
                bottom: 80px;
            }
        }

        /* No loading indicators, pure video experience */
    </style>
</head>

<body>

    <!-- Fullscreen Cinematic Video Background -->
    <video autoplay muted loop playsinline class="bg-video">
        <source src="static/Videos.mp4" type="video/mp4">
        <!-- Silent fallback: pure black background maintains experience -->
    </video>

    <!-- Dark Overlay for depth -->
    <div class="video-overlay"></div>

    <!-- Minimal Brand Logo -->
    <div class="brand-container">
        <img src="static/logo.png" alt="Espresso" class="logo" onerror="this.style.display='none'">
    </div>


    <!-- White fade overlay for smooth redirect transition -->
    <div id="fadeOverlay" class="fade-overlay"></div>

    <script>
        (function () {
            const NEXT_DESTINATION = '/splash';

            const fadeOverlay = document.getElementById('fadeOverlay');
            let isRedirecting = false;

            function performRedirect(destination) {
                if (isRedirecting) return;
                isRedirecting = true;

                if (fadeOverlay) fadeOverlay.classList.add('active');

                setTimeout(() => {
                    window.location.href = destination;
                }, 600);
            }

            // Auto-redirect after 6 seconds
            setTimeout(() => {
                performRedirect(NEXT_DESTINATION);
            }, 6500);

            // Video background handling
            const bgVideo = document.querySelector('.bg-video');
            if (bgVideo) {
                bgVideo.addEventListener('error', () => { });

                const playPromise = bgVideo.play();
                if (playPromise !== undefined) {
                    playPromise.catch(() => { });
                }
            }

            // Logo fallback
            const logoImg = document.querySelector('.logo');
            if (logoImg) {
                logoImg.addEventListener('error', () => {
                    logoImg.style.display = 'none';
                });
            }

            // Prevent body scrolling
            document.body.style.overflow = 'hidden';
            document.body.style.position = 'fixed';
            document.body.style.width = '100%';
            document.body.style.height = '100%';

            // Prefetch next page for smoother transition
            const link = document.createElement('link');
            link.rel = 'prefetch';
            link.href = NEXT_DESTINATION;
            document.head.appendChild(link);

            // Keyboard support: Space to pause/play potential is here, but currently just purely atmospheric
        })();
    </script>
</body>

</html>
