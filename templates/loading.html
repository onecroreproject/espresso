<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Espresso — Cinematic Experience</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: #ffffff;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        /* Fullscreen Video - Dual Buffer System */
        .bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
            transition: opacity 0.5s ease;
        }

        #videoLoop {
            opacity: 0;
            z-index: 2;
        }

        #videoIntro {
            z-index: 3;
        }

        #videoIntro.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #videoLoop.active {
            opacity: 1;
        }

        /* Next Button - Cinematic Style */
        .next-btn {
            position: fixed;
            bottom: 40px;
            left: 50%;
            z-index: 30;
            padding: 12px 32px;
            background: rgba(255, 222, 173, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            color: #3E2723;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 4px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            opacity: 0;
            pointer-events: none;
            transform: translateX(-50%) translateY(10px);
        }

        .next-btn.visible {
            opacity: 0.8;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0);
        }

        .next-btn:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: rgba(255, 255, 255, 0.6);
            opacity: 1;
            transform: translateX(-50%) translateY(-2px);
        }

        /* Smooth fade overlay for transition to next page */
        .fade-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #ffffff;
            z-index: 50;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.7s cubic-bezier(0.2, 0.9, 0.3, 1.1);
        }

        .fade-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        @media (max-width: 768px) {
            .next-btn {
                bottom: 30px;
                width: 80%;
                text-align: center;
            }
        }
    </style>
</head>

<body>

    <!-- Dual Video Buffer System -->
    <video autoplay muted playsinline class="bg-video" id="videoIntro">
        <source src="static/video01.mp4" type="video/mp4">
    </video>
    <video muted loop playsinline class="bg-video" id="videoLoop" preload="auto">
        <source src="static/video02.mp4" type="video/mp4">
    </video>

    <!-- Manual Control -->
    <button class="next-btn" id="nextBtn">Explore More</button>

    <!-- White fade overlay for smooth redirect transition -->
    <div id="fadeOverlay" class="fade-overlay"></div>

    <script>
        (function () {
            const NEXT_DESTINATION = '/allproject';
            const fadeOverlay = document.getElementById('fadeOverlay');
            const nextBtn = document.getElementById('nextBtn');
            const videoIntro = document.getElementById('videoIntro');
            const videoLoop = document.getElementById('videoLoop');
            let isRedirecting = false;

            function performRedirect(destination) {
                if (isRedirecting) return;
                isRedirecting = true;
                if (fadeOverlay) fadeOverlay.classList.add('active');
                setTimeout(() => {
                    window.location.href = destination;
                }, 600);
            }

            // Click listener for manual navigation
            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    performRedirect(NEXT_DESTINATION);
                });
            }

            // Seamless Dual Video Transition Logic
            if (videoIntro && videoLoop) {
                videoIntro.addEventListener('ended', () => {
                    // Handoff to videoLoop
                    videoLoop.play();
                    videoLoop.classList.add('active');
                    videoIntro.classList.add('hidden');
                    
                    // Show navigation button
                    if (nextBtn) {
                        nextBtn.classList.add('visible');
                    }
                });

                // Fallback: Ensure intro plays
                videoIntro.play().catch(() => {});
            }
        })();
    </script>
</body>

</html>l>
