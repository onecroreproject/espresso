<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>espresso · visual carousel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@20..48,100..700,0,1" />
  <style>
    body { font-family: 'Inter', sans-serif; }
    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-4px); }
    }
    .float-animation {
      animation: float 4s ease-in-out infinite;
    }
    /* keep material symbols available, but we won't use them on slide 1 & 2 */
    .material-symbols-rounded {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    /* consistent image circle style */
    .perk-image {
      width: 56px;
      height: 56px;
      object-fit: cover;
      border-radius: 9999px;
      background-color: #ffffff;
      border: 1px dashed #f0f0f0;
      padding: 0.25rem;
    }
    .perk-image-large {
      width: 120px;
      height: 120px;
      object-fit: cover;
      border-radius: 9999px;
      border: 1px dashed #f0f0f0;
      padding: 0.5rem;
      background-color: #ffffff;
    }
    /* layout consistency */
    .slide-content {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
    }
  </style>
</head>
<body class="bg-[#ffffff] p-0 m-0">
  
  <!-- Main Card Container -->
  <div class="w-full h-[100dvh] overflow-hidden md:h-auto md:max-w-sm md:mx-auto md:my-8 bg-[#ffffff] flex flex-col p-8 shadow-xl md:rounded-3xl relative">
    
    <!-- TOP LOGO - NOW IN FLOW -->
    <div class="flex justify-center mb-4 pt-4">
      <img src="static/logo.png" alt="Espresso Logo" class="h-10 float-animation" 
           onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22260%22%20height%3D%2280%22%20viewBox%3D%220%200%20260%2080%22%3E%3Crect%20width%3D%22260%22%20height%3D%2280%22%20fill%3D%22%23f9f1e7%22%2F%3E%3Ctext%20x%3D%2230%22%20y%3D%2252%22%20font-family%3D%22Montserrat%22%20font-size%3D%2232%22%20fill%3D%22%238b5a2b%22%3EESPRESSO%3C%2Ftext%3E%3C%2Fsvg%3E';">
    </div>
    
    <!-- CAROUSEL SECTION -->
    <div class="relative w-full overflow-hidden flex-1 flex items-center">
      <!-- Carousel Track -->
      <div class="flex transition-transform duration-300 ease-out w-full" id="carouselTrack">
        
        <!-- PAGE 1: 6th Cup Free — now using image instead of icons -->
        <div class="w-full flex-shrink-0 px-2">
          <div class="slide-content">
            <div class="text-center mt-4">
              <h1 class="text-[26px] leading-tight font-normal text-[#4a3a2b]">
                6th cup <span class="font-semibold text-[#8B5A2B]">free</span>
              </h1>
              <p class="text-gray-500 text-sm mt-2">Collect stamps & get 1 free Drink</p>
            </div>
            
            <!-- image row replaces icon row: exactly same spacing as before, but now all images -->
              <div class="flex justify-center items-center mt-16">
              <div class="w-48 h-48 rounded-full bg-[#ffffff] flex items-center justify-center border-2 border-dashed border-[#f0f0f0] p-4">
                <img src="static/coffee-bottle-bottle-drink-svgrepo-com.svg" alt="Coffee Cup" class="w-32 h-32 object-contain rounded-full" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22128%22%20height%3D%22128%22%20viewBox%3D%220%200%20128%20128%22%3E%3Ccircle%20cx%3D%2264%22%20cy%3D%2264%22%20r%3D%2260%22%20fill%3D%22%23f5f1eb%22%20stroke%3D%22%23d1d5db%22%20stroke-width%3D%222%22%20stroke-dasharray%3D%224%204%22%2F%3E%3Ctext%20x%3D%2232%22%20y%3D%2280%22%20font-size%3D%2220%22%20fill%3D%22%239ca3af%22%3Ecoffee%3C%2Ftext%3E%3C%2Fsvg%3E';">
              </div>
            </div>
            <!-- Progress text -->
            <p class="text-center text-sm text-gray-500 mt-8">6 collected next Drink free collected ·</p>
          </div>
        </div>
        
        <!-- PAGE 2: Top-up Bonus Money — now using image instead of money/material icons -->
        <div class="w-full flex-shrink-0 px-2">
          <div class="slide-content">
            <div class="text-center mt-4">
              <h1 class="text-[26px] leading-tight font-normal text-[#4a3a2b]">
                Top-up & get <span class="font-semibold text-[#8B5A2B]">bonus</span>
              </h1>
              <p class="text-gray-500 text-sm mt-2">Extra money on every reload</p>
            </div>
            
            <!-- all images row (replaces previous bolt/savings icons) -->
             <div class="flex justify-center items-center mt-16">
              <div class="w-48 h-48 rounded-full bg-[#ffffff] flex items-center justify-center border-2 border-dashed border-[#f0f0f0] p-4">
                <img src="static/money-bag.svg" alt="Coffee Cup" class="w-32 h-32 object-contain rounded-full" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22128%22%20height%3D%22128%22%20viewBox%3D%220%200%20128%20128%22%3E%3Ccircle%20cx%3D%2264%22%20cy%3D%2264%22%20r%3D%2260%22%20fill%3D%22%23f5f1eb%22%20stroke%3D%22%23d1d5db%22%20stroke-width%3D%222%22%20stroke-dasharray%3D%224%204%22%2F%3E%3Ctext%20x%3D%2232%22%20y%3D%2280%22%20font-size%3D%2220%22%20fill%3D%22%239ca3af%22%3Ecoffee%3C%2Ftext%3E%3C%2Fsvg%3E';">
              </div>
            </div>
            
            
            <!-- descriptive text -->
            <p class="text-center text-sm text-gray-500 mt-8">Top-up to unlock bonus levels</p>
          </div>
        </div>
        
        <!-- PAGE 3: Customize & Pickup - WITH COFFEE CUP IMAGE CENTERED (larger hero) -->
        <div class="w-full flex-shrink-0 px-2">
          <div class="slide-content">
            <div class="text-center mt-4">
              <h1 class="text-[26px] leading-tight font-normal text-[#4a3a2b]">
                Customize & <span class="font-semibold text-[#8B5A2B]">pickup</span>
              </h1>
              <p class="text-gray-500 text-sm mt-2">Ready when you are</p>
            </div>
            
            <!-- Centered large coffee cup image (hero style) -->
            <div class="flex justify-center items-center mt-16">
              <div class="w-48 h-48 rounded-full bg-[#ffffff] flex items-center justify-center border-2 border-dashed border-[#f0f0f0] p-4">
                <img src="static/coffee_cup.jpg" alt="Coffee Cup" class="w-32 h-32 object-contain rounded-full" onerror="this.src='data:image/svg+xml,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22128%22%20height%3D%22128%22%20viewBox%3D%220%200%20128%20128%22%3E%3Ccircle%20cx%3D%2264%22%20cy%3D%2264%22%20r%3D%2260%22%20fill%3D%22%23ffffff%22%20stroke%3D%22%23f0f0f0%22%20stroke-width%3D%222%22%20stroke-dasharray%3D%224%204%22%2F%3E%3Ctext%20x%3D%2232%22%20y%3D%2280%22%20font-size%3D%2220%22%20fill%3D%22%23f0f0f0%22%3Ecoffee%3C%2Ftext%3E%3C%2Fsvg%3E';">
              </div>
            </div>
            
            <!-- Pickup message -->
            <p class="text-center text-sm text-gray-500 mt-8">Customize · fresh pack · 5-8 min</p>
          </div>
        </div>
      </div>
    </div>
 
    <!-- BOTTOM SECTION -->
    <div class="w-full space-y-6 mt-auto pt-8 pb-4">
      <!-- Carousel Indicators (dots) -->
      <div class="flex justify-center gap-1.5" id="dotContainer">
        <span class="w-6 h-1.5 bg-[#8B5A2B] rounded-full cursor-pointer" onclick="goToSlide(0)"></span>
        <span class="w-1.5 h-1.5 bg-[#f0f0f0] rounded-full cursor-pointer" onclick="goToSlide(1)"></span>
        <span class="w-1.5 h-1.5 bg-[#f0f0f0] rounded-full cursor-pointer" onclick="goToSlide(2)"></span>
      </div>
      
      <!-- Next Button - navigates to /register -->
      <button class="w-1/2 max-w-[200px] mx-auto bg-[#8B5A2B] text-white text-lg py-4 rounded-xl hover:bg-[#6B3E1A] transition-all font-medium block" id="nextBtn">
        Next
      </button>
    </div>
  </div>

  <script>
    let currentSlide = 0;
    const track = document.getElementById('carouselTrack');
    const dots = document.querySelectorAll('#dotContainer span');
    const nextBtn = document.getElementById('nextBtn');
    
    function goToSlide(index) {
      if (index < 0) index = 0;
      if (index > 2) index = 2;
      
      currentSlide = index;
      
      track.style.transform = `translateX(-${currentSlide * 100}%)`;
      
      dots.forEach((dot, i) => {
        if (i === currentSlide) {
          dot.className = 'w-6 h-1.5 bg-[#8B5A2B] rounded-full cursor-pointer';
        } else {
          dot.className = 'w-1.5 h-1.5 bg-[#f0f0f0] rounded-full cursor-pointer';
        }
      });
      
      nextBtn.textContent = (currentSlide === 2) ? 'Next' : 'Next';
    }
    
    nextBtn.addEventListener('click', () => {
      if (currentSlide < 2) {
        goToSlide(currentSlide + 1);
      } else {
        window.location.href = '/register';
      }
    });
    
    // Touch swipe support
    let touchStartX = 0;
    let touchEndX = 0;
    
    track.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].screenX;
    }, { passive: true });
    
    track.addEventListener('touchend', (e) => {
      touchEndX = e.changedTouches[0].screenX;
      const diff = touchStartX - touchEndX;
      if (Math.abs(diff) > 50) {
        if (diff > 0 && currentSlide < 2) goToSlide(currentSlide + 1);
        else if (diff < 0 && currentSlide > 0) goToSlide(currentSlide - 1);
      }
    }, { passive: true });
    
    // Initialize
    goToSlide(0);
  </script>
</body>
</html>
