<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <title>espresso · vertical splash</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    @keyframes float {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-3px);
      }
    }

    @keyframes reveal {
      0% {
        opacity: 0;
        transform: translateY(-20px) scale(0.95);
        filter: blur(8px);
      }

      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
        filter: blur(0);
      }
    }

    @keyframes shimmer {
      0% {
        background-position: -200% center;
      }

      100% {
        background-position: 200% center;
      }
    }

    .float-animation {
      animation: float 4s ease-in-out infinite;
    }

    .reveal-animation {
      animation: reveal 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
    }

    .shimmer-logo {
      position: relative;
      overflow: hidden;
    }

    .shimmer-logo::after {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(to bottom right, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.1) 40%, rgba(255, 255, 255, 0.4) 50%, rgba(255, 255, 255, 0.1) 60%, rgba(255, 255, 255, 0) 100%);
      transform: rotate(45deg);
      animation: shimmer 6s infinite;
      pointer-events: none;
    }

    /* Stack Container */
    .card-stack {
      position: relative;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Individual Card Style */
    .card {
      position: absolute;
      width: 100%;
      height: 100%;
      background: #ffffff;
      /* uniform background or white if preferred */
      border-radius: 0px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      /* centering content */
      transition: transform 0.6s cubic-bezier(0.23, 1, 0.32, 1), opacity 0.5s ease-out, filter 0.5s ease;
      will-change: transform, opacity;
      touch-action: none;
    }

    .hero-image-wrapper {
      width: clamp(150px, 30vh, 220px);
      height: clamp(150px, 30vh, 220px);
      border-radius: 9999px;
      border: 2px dashed #FFDEAD;
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.03);
    }

    .hero-image-wrapper img {
      width: 75%;
      height: 75%;
      object-fit: contain;
    }

    /* States for the stack */
    .card.top {
      transform: translateY(0) scale(1) rotate(0);
      opacity: 1;
      z-index: 10;
    }

    .card.next {
      transform: translateY(20px) scale(0.9) rotate(0);
      opacity: 0.6;
      z-index: 5;
      filter: blur(2px);
    }

    .card.behind {
      transform: translateY(40px) scale(0.8) rotate(0);
      opacity: 0;
      z-index: 1;
      pointer-events: none;
    }

    .card.dismissed {
      transform: translateY(-120vh) scale(0.9) rotate(-10deg);
      opacity: 0;
      z-index: 20;
      pointer-events: none;
    }

    /* Custom scroll indicator dots */
    .dot-pill {
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    @keyframes bounce-up {

      0%,
      20%,
      50%,
      80%,
      100% {
        transform: translateY(0);
      }

      40% {
        transform: translateY(-8px);
      }

      60% {
        transform: translateY(-4px);
      }
    }

    .bounce-up {
      animation: bounce-up 2s infinite;
    }
  </style>
</head>

<body class="bg-white p-0 m-0 overflow-hidden">

  <!-- Main Viewport Container -->
  <div
    class="w-full h-screen md:max-w-sm md:mx-auto md:my-8 bg-white flex flex-col justify-between shadow-2xl md:rounded-[40px] relative overflow-hidden"
    style="padding-top: env(safe-area-inset-top, 2rem); padding-bottom: env(safe-area-inset-bottom, 2rem);">


    <!-- Header Logo Area -->
    <div
      class="absolute top-[env(safe-area-inset-top,2rem)] mt-20 left-0 right-0 flex justify-center z-50 reveal-animation">
      <div class="shimmer-logo p-2">
        <img src="static/logo.png" alt="Espresso" class="h-14 float-animation">
      </div>
    </div>

    <!-- Responsive Card Stack Section (Gap Removed) -->
    <div class="flex-1 mt-0 relative px-6">
      <div class="card-stack" id="cardStack">

        <!-- CARD 1 -->
        <div class="card top" id="card-0">
          <div class="text-center mb-4 px-4">
            <h1 class="text-2xl font-normal text-[#3E2723] leading-tight">6th cup <span
                class="font-bold text-[#3E2723]">free</span></h1>
            <p class="text-[#3E2723] opacity-70 text-xs mt-1">Collect stamps & get 1 free drink</p>
          </div>
          <div class="hero-image-wrapper overflow-hidden border-[1.5px] border-solid border-[#FFDEAD] shadow-xl">
            <img src="static/coffee-bottle-bottle-drink-svgrepo-com.svg" alt="Free Drink"
              class="w-full h-full object-cover">
          </div>
          <p class="text-[#3E2723] opacity-60 text-[10px] tracking-widest uppercase mt-4 mb-4">6 stamps for a reward</p>
          <p class="text-[#3E2723] text-sm font-bold tracking-widest uppercase mt-4 mb-4 flex items-center gap-1">
            SWIPE TOP
            <div class="flex flex-col -space-y-2.5">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="18 15 12 9 6 15"></polyline>
              </svg>
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="18 15 12 9 6 15"></polyline>
              </svg>
            </div>
          </p>

        </div>

        <!-- CARD 2 -->
        <div class="card next" id="card-1">
          <div class="text-center mb-4 px-4">
            <h1 class="text-2xl font-normal text-[#3E2723] leading-tight">Top-up & <span
                class="font-bold text-[#3E2723]">bonus</span></h1>
            <p class="text-[#3E2723] opacity-70 text-xs mt-1">Extra credit on every reload</p>
          </div>
          <div class="hero-image-wrapper overflow-hidden border-[1.5px] border-solid border-[#FFDEAD] shadow-xl">
            <img src="static/money-bag.svg" alt="Bonus" class="w-full h-full object-cover">
          </div>
          <p class="text-[#3E2723] opacity-60 text-[10px] tracking-widest uppercase mt-4 mb-4">Instant reload credits</p>
          <p class="text-[#3E2723] text-sm font-bold tracking-widest uppercase mt-4 mb-4 flex items-center gap-1">
            SWIPE TOP
            <div class="flex flex-col -space-y-2.5">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="18 15 12 9 6 15"></polyline>
              </svg>
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="18 15 12 9 6 15"></polyline>
              </svg>
            </div>
          </p>

        </div>

        <!-- CARD 3 -->
        <div class="card behind" id="card-2">
          <div class="text-center mb-4 px-4">
            <h1 class="text-2xl font-normal text-[#3E2723] leading-tight">Fast <span
                class="font-bold text-[#3E2723]">pickup</span></h1>
            <p class="text-[#3E2723] opacity-70 text-xs mt-1">Ready when you are</p>
          </div>
          <div class="hero-image-wrapper overflow-hidden border-[1.5px] border-solid border-[#FFDEAD] shadow-xl">
            <img src="static/coffee_cup.jpg" alt="Pickup" class="w-full h-full object-cover">
          </div>
          <p class="text-[#3E2723] opacity-60 text-[10px] tracking-widest uppercase mt-4 mb-4">Skip the queue</p>
          <p class="text-[#3E2723] text-sm font-bold tracking-widest uppercase mt-4 mb-4 flex items-center gap-1">
            SWIPE TOP
            <div class="flex flex-col -space-y-2.5">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="18 15 12 9 6 15"></polyline>
              </svg>
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="18 15 12 9 6 15"></polyline>
              </svg>
            </div>
          </p>


        </div>


      </div>
    </div>

    <!-- Interface Controls (Minimized) -->
    <div class="relative w-full px-8 pb-4 flex flex-col gap-4 z-50">

      <!-- Right Side Indicators (Responsive Sidebar) -->
      <div class="absolute right-6 top-[-50vh] flex flex-col gap-2 scale-90 md:scale-100" id="dotContainer">
        <div class="dot-pill w-1.5 h-8 bg-[#FFDEAD] rounded-full" onclick="resetStack()"></div>
        <div class="dot-pill w-1.5 h-1.5 bg-gray-300 rounded-full"></div>
        <div class="dot-pill w-1.5 h-1.5 bg-gray-300 rounded-full"></div>
      </div>

     
    </div>

  </div>

  </div>

  <script>
    let currentIdx = 0;
    const totalCards = 3;
    const cards = [document.getElementById('card-0'), document.getElementById('card-1'), document.getElementById('card-2')];
    const dots = document.getElementById('dotContainer').children;
    const mainBtn = document.getElementById('mainBtn');

    function updateStack() {
      cards.forEach((card, i) => {
        card.className = 'card';
        if (i < currentIdx) {
          card.classList.add('dismissed');
        } else if (i === currentIdx) {
          card.classList.add('top');
        } else if (i === currentIdx + 1) {
          card.classList.add('next');
        } else {
          card.classList.add('behind');
        }
      });

      // Update dots
      for (let i = 0; i < dots.length; i++) {
        if (i === currentIdx) {
          dots[i].className = 'dot-pill w-1.5 h-8 bg-[#FFDEAD] rounded-full';
        } else {
          dots[i].className = 'dot-pill w-1.5 h-1.5 bg-gray-300 rounded-full';
        }
      }

      // Update button text on last card (No button anymore, but we can update text hint)
      const hint = document.getElementById('swipeHint');
      if (currentIdx === totalCards - 1) {
        hint.textContent = 'TAP TO JOIN';
      } else {
        hint.textContent = 'SWIPE TOP';
      }
    }

    function nextCard() {
      if (currentIdx < totalCards - 1) {
        currentIdx++;
        updateStack();
      } else {
        window.location.href = '/register';
      }
    }

    function resetStack() {
      currentIdx = 0;
      updateStack();
    }

    // Gestures
    let startY = 0;
    document.getElementById('cardStack').addEventListener('touchstart', (e) => {
      startY = e.touches[0].clientY;
    });

    document.getElementById('cardStack').addEventListener('touchend', (e) => {
      let endY = e.changedTouches[0].clientY;
      if (startY - endY > 50) { // Swipe UP
        nextCard();
      } else if (endY - startY > 80) { // Swipe DOWN (experimental reset)
        if (currentIdx > 0) {
          currentIdx--;
          updateStack();
        }
      }
    });

    // Keyboard support
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowUp' || e.key === ' ') nextCard();
    });

  </script>
</body>

</html>
